services:
  amnezia_panel:
    image: prvtpro/amnezia-panel:1.4.2
    container_name: amnezia_panel
    # Set PANEL_PORT to run the app on a non-default port inside the container.
    # Set APP_PORT to publish on a different host port (defaults to PANEL_PORT).
    environment:
      PANEL_HOST: ${PANEL_HOST:-0.0.0.0}
      PANEL_PORT: ${PANEL_PORT:-5000}
      SECRET_KEY: ${SECRET_KEY:-}
    ports:
      - "${APP_PORT:-${PANEL_PORT:-5000}}:${PANEL_PORT:-5000}"
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    # To connect the (Traefik) balancer, assign one network to both containers and uncomment the labels by replacing the domain with your own.
    # labels:
    #   - traefik.enable=true
    #   - traefik.http.routers.amnezia_panel.entrypoints=web,websecure
    #   - traefik.http.routers.amnezia_panel.rule=Host(`amnezia.domain`)
    #   - traefik.http.services.amnezia_panel.loadbalancer.server.port=${PANEL_PORT:-5000}
    healthcheck:
      test:
        - CMD-SHELL
        - python -c "import os, socket; s=socket.socket(); s.connect(('127.0.0.1', int(os.environ.get('PANEL_PORT', 5000)))); s.close()"
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
